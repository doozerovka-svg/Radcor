<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами — Radcor-Prim</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=10.6">

    <style>
        body {
            background-color: var(--colour-bg);
            color: var(--colour-text);
        }
        .admin-header {
            background: #fff;
            border-bottom: 1px solid var(--colour-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .admin-header h1 {
            font-size: 24px;
            font-family: var(--font-display);
            margin: 0;
            color: var(--colour-mol-red);
        }
        .admin-toolbar {
            padding: 20px 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: var(--colour-card-bg);
            border-bottom: 1px solid var(--colour-border);
        }
        .admin-container {
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .file-status {
            font-size: 14px;
            color: var(--colour-text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-indicator.active {
            background: var(--colour-mol-green);
            box-shadow: 0 0 8px var(--colour-mol-green);
        }

        /* Data Table */
        .table-wrap {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--colour-border);
            overflow-x: auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--colour-border);
            font-size: 14px;
        }
        th {
            background: #f9fafb;
            font-weight: 600;
            color: var(--colour-text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background: #fdfdfd;
        }
        .prod-img-min {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: #f0f0f0;
            border-radius: 6px;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .modal-card h2 {
            margin-top: 0;
            font-family: var(--font-display);
            font-size: 20px;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--colour-text-muted);
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 14px;
            border: 1px solid var(--colour-border);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--colour-mol-red);
        }
        .spec-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .spec-row input {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--colour-border);
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>Radcor-Prim Admin</h1>
        <div>
            <a href="index.html" class="btn btn-outline" style="font-size: 14px;">На сайт</a>
        </div>
    </header>

    <div class="admin-toolbar">
        <button id="btnOpenFile" class="btn btn-primary">📁 Открыть products.json</button>
        <button id="btnSaveFile" class="btn btn-primary" style="display:none; background: var(--colour-mol-green);">💾 Сохранить изменения</button>
        <button id="btnAdd" class="btn btn-outline" style="display:none;">+ Добавить товар</button>
        
        <div class="file-status">
            <div id="statusIndicator" class="status-indicator"></div>
            <span id="statusText">Файл не открыт</span>
        </div>
    </div>

    <div class="admin-container">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:60px">Фото</th>
                        <th>Артикул</th>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Объемы (Л)</th>
                        <th style="text-align:right">Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" style="text-align:center; padding: 40px; color: var(--colour-text-muted);">
                            Нажмите "Открыть products.json", чтобы начать работу.<br><br>
                            <em>Этот интерфейс работает напрямую с вашим локальным файлом без использования сервера!</em>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <h2 id="modalTitle">Редактирование товара</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Артикул (SKU)</label>
                    <input type="text" id="f_sku">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="f_category">
                        <option value="motor-oils">Автомобильные масла</option>
                        <option value="coolants">Охлаждающие жидкости</option>
                        <option value="autochemistry">Автохимия и смазки</option>
                        <option value="winter">Зимняя программа</option>
                        <option value="accessories">Расходники и аксессуары</option>
                        <option value="industrial">Промышленный сектор</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Название товара</label>
                    <input type="text" id="f_name">
                </div>
                <div class="form-group full">
                    <label>URL Фотографии</label>
                    <input type="text" id="f_photo" placeholder="https://...">
                </div>
                <div class="form-group full">
                    <label>Объемы (через запятую)</label>
                    <input type="text" id="f_volumes" placeholder="1, 4, 60, 208">
                </div>
                <div class="form-group full">
                    <label>Краткое описание</label>
                    <textarea id="f_desc" rows="3"></textarea>
                </div>
                
                <div class="form-group full">
                    <label>Характеристики (Спецификации)</label>
                    <div id="specsContainer"></div>
                    <button id="btnAddSpec" class="btn btn-outline" style="font-size: 12px; align-self: flex-start; margin-top: 5px;">+ Добавить характеристику</button>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" id="btnSaveModal">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let fileHandle = null;
        let productsData = [];
        let editingIndex = -1;

        const tableBody = document.getElementById('tableBody');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        // Check if File System Access API is supported
        if (!window.showOpenFilePicker) {
            alert("Ваш браузер не поддерживает File System Access API. Пожалуйста, используйте Chrome, Edge или Opera на ПК.");
        }

        document.getElementById('btnOpenFile').addEventListener('click', async () => {
            try {
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'JSON Files',
                        accept: {'application/json': ['.json']}
                    }],
                    multiple: false
                });

                const file = await fileHandle.getFile();
                const contents = await file.text();
                productsData = JSON.parse(contents);

                statusIndicator.classList.add('active');
                statusText.innerText = "Открыт файл: " + file.name;
                
                document.getElementById('btnSaveFile').style.display = 'block';
                document.getElementById('btnAdd').style.display = 'block';

                renderTable();
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('btnSaveFile').addEventListener('click', async () => {
            if (!fileHandle) return;
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(productsData, null, 2));
                await writable.close();
                alert("Успешно сохранено в файл!");
            } catch (err) {
                console.error(err);
                alert("Ошибка при сохранении: " + err.message);
            }
        });

        function renderTable() {
            tableBody.innerHTML = '';
            if (productsData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Нет товаров</td></tr>';
                return;
            }

            productsData.forEach((p, index) => {
                const tr = document.createElement('tr');
                const volString = Array.isArray(p.volumes) ? p.volumes.join(', ') : p.volumes;
                
                tr.innerHTML = `
                    <td><img src="${p.photo_url || ''}" class="prod-img-min" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2YwZjBmMCIvPjwvc3ZnPg=='"></td>
                    <td style="font-family: var(--font-code); font-size:13px">${p.sku}</td>
                    <td style="font-weight:500">${p.name}</td>
                    <td>${p.category}</td>
                    <td>${volString}</td>
                    <td style="text-align:right">
                        <div class="actions" style="justify-content:flex-end">
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:12px" onclick="openModal(${index})">Изменить</button>
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:12px; color:var(--colour-mol-red); border-color:var(--colour-mol-red)" onclick="deleteProduct(${index})">Удалить</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // ===================== MODAL LOGIC =====================
        const modal = document.getElementById('editModal');
        
        document.getElementById('btnAdd').addEventListener('click', () => {
            openModal(-1);
        });

        function openModal(index) {
            editingIndex = index;
            document.getElementById('specsContainer').innerHTML = '';
            
            if (index === -1) {
                document.getElementById('modalTitle').innerText = 'Добавление товара';
                document.getElementById('f_sku').value = `MOL-${Math.floor(1000 + Math.random()*9000)}`;
                document.getElementById('f_name').value = '';
                document.getElementById('f_category').value = 'motor-oils';
                document.getElementById('f_photo').value = '';
                document.getElementById('f_volumes').value = '1, 4, 60, 208';
                document.getElementById('f_desc').value = '';
            } else {
                document.getElementById('modalTitle').innerText = 'Редактирование товара';
                const p = productsData[index];
                document.getElementById('f_sku').value = p.sku || '';
                document.getElementById('f_name').value = p.name || '';
                document.getElementById('f_category').value = p.category || 'motor-oils';
                document.getElementById('f_photo').value = p.photo_url || '';
                document.getElementById('f_volumes').value = Array.isArray(p.volumes) ? p.volumes.join(', ') : (p.volumes || '');
                document.getElementById('f_desc').value = p.description || '';
                
                if (Array.isArray(p.specs)) {
                    p.specs.forEach(s => addSpecRow(s.label, s.value));
                }
            }
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        document.getElementById('btnAddSpec').addEventListener('click', () => {
            addSpecRow('', '');
        });

        function addSpecRow(label, value) {
            const div = document.createElement('div');
            div.className = 'spec-row';
            div.innerHTML = `
                <input type="text" placeholder="Название (напр. Вязкость)" value="${label.replace(/"/g, '&quot;')}">
                <input type="text" placeholder="Значение (напр. 5W-30)" value="${value.replace(/"/g, '&quot;')}">
                <button class="btn btn-outline" style="padding:0 10px; border-color:var(--colour-mol-red); color:var(--colour-mol-red)" onclick="this.parentElement.remove()">X</button>
            `;
            document.getElementById('specsContainer').appendChild(div);
        }

        document.getElementById('btnSaveModal').addEventListener('click', () => {
            const sku = document.getElementById('f_sku').value;
            const name = document.getElementById('f_name').value;
            const category = document.getElementById('f_category').value;
            const photo_url = document.getElementById('f_photo').value;
            const desc = document.getElementById('f_desc').value;
            
            const volsRaw = document.getElementById('f_volumes').value;
            const volumes = volsRaw.split(',').map(s => s.trim()).filter(s => s !== '').map(s => isNaN(s) ? s : Number(s));

            const specs = [];
            document.querySelectorAll('#specsContainer .spec-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value.trim() !== '') {
                    specs.push({ label: inputs[0].value.trim(), value: inputs[1].value.trim() });
                }
            });

            const newProduct = {
                sku, name, category, photo_url, volumes, description: desc, specs
            };

            if (editingIndex === -1) {
                productsData.unshift(newProduct);
            } else {
                // merge with existing to preserve hidden fields like prices if they exist
                productsData[editingIndex] = { ...productsData[editingIndex], ...newProduct };
            }

            closeModal();
            renderTable();
        });

        function deleteProduct(index) {
            if (confirm("Вы уверены, что хотите удалить этот товар?")) {
                productsData.splice(index, 1);
                renderTable();
            }
        }
    </script>
</body>
</html>
